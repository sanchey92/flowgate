env: dev
log_level: debug

server:
  instance_id: fg-node-1
  shutdown_timeout: 10s

defaults:
  connect_timeout: 5s
  idle_timeout: 60s
  keepalive: 30s
  max_conns: 1024
  buf_size: 32768
  proxyproto_header_timeout: 3s
  backoff:
    base: 100ms
    max: 5s
  udp:
    session_idle: 30s
    backend_read: 5s
    dial: 2s

routes:
  - name: tcp-edge
    protocol: tcp
    listen: ":18080"
    balancer: round_robin
    proxy_protocol: off
    timeouts:
      connect_timeout: 5s
      idle_timeout: 60s
      keepalive: 30s
      proxyproto_header_timeout: 3s
    backends:
      - addr: "127.0.0.1:9001"
        weight: 5
      - addr: "127.0.0.1:9002"
        weight: 3

  - name: udp-edge
    protocol: udp
    listen: ":18081"
    balancer: least_conn
    timeouts:
      udp:
        session_idle: 30s
        backend_read: 5s
        dial: 2s
    backends:
      - addr: "127.0.0.1:9101"
        weight: 1
      - addr: "127.0.0.1:9102"
        weight: 1
